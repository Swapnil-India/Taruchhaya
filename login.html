<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Taruchhaya Inventory Management</title>
    <meta name="description" content="Sign in to Taruchhaya - The enterprise-grade inventory management and business analytics platform.">
    <meta name="author" content="Taruchhaya Enterprise">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://github.com/Swapnil-India/Taruchhaya">
    <meta property="og:title" content="Login | Taruchhaya Inventory">
    <meta property="og:description" content="Secure administrative access to Taruchhaya Analytics and POS.">
    <meta property="og:image" content="https://img.icons8.com/color/512/natural-food.png">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://img.icons8.com/color/48/natural-food.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        :root {
            --bg-app: #09090b;
            --bg-panel: rgba(24, 24, 27, 0.75);
            --bg-panel-solid: #18181b;
            --bg-sidebar: #121214;
            --bg-hover: rgba(255, 255, 255, 0.05);
            --text-primary: #f4f4f5;
            --text-secondary: #a1a1aa;
            --text-tertiary: #71717a;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(255, 255, 255, 0.15);
            --accent-brand: #6366f1;
            --accent-brand-hover: #4f46e5;
            --accent-brand-glow: rgba(99, 102, 241, 0.3);
            --accent-danger: #ef4444;
            --accent-success: #10b981;
            --ai-gradient: linear-gradient(135deg, #6366f1, #d946ef);
            --glass-blur: blur(16px);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font-main: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: var(--font-main);
            background-color: var(--bg-app);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        @media (min-width: 769px) {
            body {
                overflow: hidden;
            }
        }

        /* Animated background canvas */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: block;
        }

        /* Ambient glow effects */
        .bg-glow {
            position: fixed;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.10) 0%, transparent 65%);
            top: -300px;
            left: -200px;
            z-index: 1;
            pointer-events: none;
        }

        .bg-glow-2 {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(217, 70, 239, 0.07) 0%, transparent 65%);
            bottom: -150px;
            right: -100px;
            z-index: 1;
            pointer-events: none;
        }

        /* Main content wrapper */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .login-header {
            text-align: center;
            margin-bottom: 28px;
            width: 100%;
        }

        .login-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px;
            height: 56px;
            background: var(--ai-gradient);
            border-radius: 14px;
            color: white;
            font-size: 28px;
            margin-bottom: 18px;
            box-shadow: 0 0 28px var(--accent-brand-glow),
                0 8px 20px rgba(0, 0, 0, 0.4);
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.8px;
            margin-bottom: 8px;
            background: linear-gradient(to bottom, #fff 30%, #a1a1aa 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* Card */
        .login-card {
            width: 100%;
            padding: 36px;
            margin-bottom: 20px;
            background: var(--bg-panel);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.04);
            transform: translateZ(0);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 24px;
                backdrop-filter: blur(6px);
                -webkit-backdrop-filter: blur(6px);
                background: rgba(24, 24, 27, 0.85);
            }

            .login-header h1 {
                font-size: 24px;
            }

            .login-logo {
                width: 48px;
                height: 48px;
                font-size: 24px;
            }
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
            gap: 4px;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-family: var(--font-main);
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        .auth-tab.active {
            background: var(--bg-panel-solid);
            color: var(--text-primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .auth-tab:hover:not(.active) {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.04);
        }

        /* Form group */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 14px;
            font-size: 18px;
            color: var(--text-tertiary);
            transition: var(--transition);
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            height: 50px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0 44px 0 44px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: var(--font-main);
            outline: none;
            transition: var(--transition);
        }

        .input-wrapper input:focus {
            border-color: var(--accent-brand);
            background: rgba(99, 102, 241, 0.05);
            box-shadow: 0 0 0 3px var(--accent-brand-glow);
        }

        .input-wrapper input:focus~.input-icon {
            color: var(--accent-brand);
        }

        /* Password toggle */
        .pass-toggle {
            position: absolute;
            right: 14px;
            background: none;
            border: none;
            color: var(--text-tertiary);
            font-size: 18px;
            cursor: pointer;
            padding: 4px;
            transition: var(--transition);
        }

        .pass-toggle:hover {
            color: var(--text-primary);
        }

        /* Row actions */
        .login-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 4px 0 22px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .remember-me input[type="checkbox"] {
            accent-color: var(--accent-brand);
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        .forgot-link {
            color: var(--accent-brand);
            text-decoration: none;
            font-weight: 500;
            font-size: 13px;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* Primary button */
        .btn-primary {
            width: 100%;
            height: 50px;
            background: var(--accent-brand);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            font-family: var(--font-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
            box-shadow: 0 4px 16px var(--accent-brand-glow);
            position: relative;
            overflow: hidden;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-brand-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px var(--accent-brand-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Loading state */
        .btn-primary.loading {
            color: transparent;
        }

        .btn-primary.loading::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            margin: 22px 0;
            color: var(--text-tertiary);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .divider::before {
            margin-right: 14px;
        }

        .divider::after {
            margin-left: 14px;
        }

        /* Quick-login buttons (Guest / User) */
        .quick-login-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-quick {
            height: 46px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-quick:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.3);
            color: var(--accent-brand);
        }

        .btn-quick i {
            font-size: 18px;
        }

        /* Footer */
        .login-footer {
            text-align: center;
            color: var(--text-tertiary);
            font-size: 13px;
        }

        .login-footer a {
            color: var(--accent-brand);
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .hint-text {
            margin-top: 14px;
            font-size: 11.5px;
            color: var(--text-tertiary);
            text-align: center;
            line-height: 1.5;
        }


        /* --- Toast Notification System --- */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 10002;
            pointer-events: none;
        }

        .toast {
            min-width: 300px;
            max-width: 400px;
            padding: 16px;
            background: var(--bg-panel-solid);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 12px;
            pointer-events: auto;
            animation: toastSlideIn 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28) both;
            transition: all 0.3s ease;
        }

        .toast.removing {
            opacity: 0;
            transform: translateX(100%) scale(0.9);
        }

        @keyframes toastSlideIn {
            from {
                opacity: 0;
                transform: translateX(100%) scale(0.9);
            }

            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .toast-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .toast.success .toast-icon {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-success);
        }

        .toast.error .toast-icon {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-danger);
        }

        .toast-content {
            flex: 1;
            font-size: 14px;
            font-weight: 500;
            line-height: 1.4;
        }

        .toast-close {
            background: none;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            transition: var(--transition);
        }

        .toast-close:hover {
            color: var(--text-primary);
        }
    </style>
</head>

<body>
    <canvas id="particleCanvas"></canvas>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="login-wrapper">
        <header class="login-header">
            <div class="login-logo">
                <i class="ph-fill ph-sparkle"></i>
            </div>
            <h1>Taruchhaya Inventory</h1>
            <p>The next-generation platform for your business</p>
        </header>

        <div class="login-card">
            <!-- Tabs: Sign In | Sign Up -->
            <div class="auth-tabs" role="tablist">
                <button class="auth-tab active" id="tabSignIn" onclick="switchTab('signin')">
                    <i class="ph ph-sign-in"></i> Sign In
                </button>
                <button class="auth-tab" id="tabSignUp" onclick="switchTab('signup')">
                    <i class="ph ph-user-plus"></i> Register
                </button>
            </div>


            <!-- ── SIGN IN FORM ── -->
            <form id="formSignIn" novalidate>
                <div class="form-group">
                    <label for="siUsername">Username</label>
                    <div class="input-wrapper">
                        <i class="ph ph-user input-icon"></i>
                        <input type="text" id="siUsername" placeholder="Enter your username" autocomplete="username"
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="siPassword">Password</label>
                    <div class="input-wrapper">
                        <i class="ph ph-lock input-icon"></i>
                        <input type="password" id="siPassword" placeholder="Enter your password"
                            autocomplete="current-password" required>
                        <button type="button" class="pass-toggle" onclick="togglePassword('siPassword', this)">
                            <i class="ph ph-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="login-actions">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe"> Remember me
                    </label>
                    <a href="#" class="forgot-link" onclick="showForgotHint(event)">Forgot password?</a>
                </div>

                <button type="submit" class="btn-primary" id="btnSignIn">
                    <i class="ph ph-sign-in"></i> Sign In
                </button>
            </form>

            <!-- ── REGISTER FORM ── -->
            <form id="formSignUp" novalidate style="display:none;">
                <div class="form-group">
                    <label for="suUsername">Username</label>
                    <div class="input-wrapper">
                        <i class="ph ph-user input-icon"></i>
                        <input type="text" id="suUsername" placeholder="Choose a username" autocomplete="username"
                            required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="suPassword">Password</label>
                    <div class="input-wrapper">
                        <i class="ph ph-lock input-icon"></i>
                        <input type="password" id="suPassword" placeholder="Min. 6 characters"
                            autocomplete="new-password" required>
                        <button type="button" class="pass-toggle" onclick="togglePassword('suPassword', this)">
                            <i class="ph ph-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="suConfirmPassword">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="ph ph-lock-key input-icon"></i>
                        <input type="password" id="suConfirmPassword" placeholder="Repeat your password"
                            autocomplete="new-password" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary" id="btnSignUp">
                    <i class="ph ph-user-plus"></i> Create Account
                </button>
            </form>


            <p class="hint-text">

            </p>
        </div>


        <footer class="login-footer" style="margin-top: 24px; text-align: center;">
            <p style="font-size: 13px; color: var(--text-tertiary); font-weight: 500; letter-spacing: 0.4px;">
                Developed with <span style="color: var(--accent-danger); animation: heartbeat 1.5s ease-in-out infinite; display: inline-block;">❤️</span> by Swapnil Sarkar.
            </p>
        </footer>
    </div>

    <!-- Heartbeat animation -->
    <style>
        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }
    </style>

    <script>
        /* ──────────────────────────────────────────
           AUTH STORAGE HELPERS
        ────────────────────────────────────────── */
        const USERS_KEY = 'ti_users';
        const SESSION_KEY = 'ti_session';

        async function hashPassword(str) {
            if (!crypto || !crypto.subtle) {
                console.warn("Web Crypto API not available. Using fallback.");
                return btoa(str); // Fallback if tested on insecure file:/// without Crypto API
            }
            const buffer = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function getUsers() {
            const raw = localStorage.getItem(USERS_KEY);
            if (!raw) {
                // Seed a default admin account (password: '1234' SHA-256 hashed)
                const defaults = [{ username: 'Supratik', password: '03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4', role: 'admin' }];
                localStorage.setItem(USERS_KEY, JSON.stringify(defaults));
                return defaults;
            }
            const users = JSON.parse(raw);
            // Migrate legacy btoa users
            let modified = false;
            users.forEach(u => {
                if (u.password === btoa('1234')) {
                    u.password = '03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4';
                    modified = true;
                }
            });
            if (modified) localStorage.setItem(USERS_KEY, JSON.stringify(users));
            return users;
        }

        function saveUsers(users) {
            localStorage.setItem(USERS_KEY, JSON.stringify(users));
        }

        function setSession(username, role, remember) {
            const sess = { username, role, loggedInAt: Date.now() };
            if (remember) {
                localStorage.setItem(SESSION_KEY, JSON.stringify(sess));
            } else {
                sessionStorage.setItem(SESSION_KEY, JSON.stringify(sess));
            }
        }

        /* Auto-redirect if already logged in */
        (function () {
            const sess = sessionStorage.getItem(SESSION_KEY) || localStorage.getItem(SESSION_KEY);
            if (sess) window.location.replace('index.html');
        })();

        /* ──────────────────────────────────────────
           NOTIFICATION SYSTEM
        ────────────────────────────────────────── */
        function showToast(message, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                container.className = 'toast-container';
                document.body.appendChild(container);
            }

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            let icon = 'ph-check-circle';
            if (type === 'error') icon = 'ph-warning-circle';
            if (type === 'warning') icon = 'ph-warning';
            if (type === 'info') icon = 'ph-info';

            toast.innerHTML = `
                <div class="toast-icon"><i class="ph-fill ${icon}"></i></div>
                <div class="toast-content">${message}</div>
                <button class="toast-close" onclick="this.parentElement.remove()"><i class="ph ph-x"></i></button>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('removing');
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }


        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            btn.disabled = loading;
            btn.classList.toggle('loading', loading);
        }

        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'ph ph-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'ph ph-eye';
            }
        }

        function switchTab(tab) {
            const isSignIn = tab === 'signin';
            document.getElementById('tabSignIn').classList.toggle('active', isSignIn);
            document.getElementById('tabSignUp').classList.toggle('active', !isSignIn);
            document.getElementById('formSignIn').style.display = isSignIn ? '' : 'none';
            document.getElementById('formSignUp').style.display = isSignIn ? 'none' : '';
        }

        function showForgotHint(e) {
            e.preventDefault();
            showToast('Please contact your system administrator.', 'info');
        }

        /* ──────────────────────────────────────────
           SIGN IN
        ────────────────────────────────────────── */
        document.getElementById('formSignIn').addEventListener('submit', async function (e) {
            e.preventDefault();
            const username = document.getElementById('siUsername').value.trim();
            const password = document.getElementById('siPassword').value;
            const remember = document.getElementById('rememberMe').checked;

            if (!username || !password) {
                showToast('Please fill in all fields.');
                return;
            }

            setLoading('btnSignIn', true);

            // Hash the input password to match stored hash
            const hashedPassword = await hashPassword(password);

            setTimeout(() => {
                const users = getUsers();
                const user = users.find(u => u.username === username && u.password === hashedPassword);

                if (user) {
                    setSession(user.username, user.role, remember);
                    showToast('Welcome back, ' + user.username + '! Redirecting...', 'success');
                    setTimeout(() => window.location.replace('index.html'), 800);
                } else {
                    showToast('Invalid username or password.', 'error');
                    setLoading('btnSignIn', false);
                }
            }, 700);
        });

        /* ──────────────────────────────────────────
           REGISTER
        ────────────────────────────────────────── */
        document.getElementById('formSignUp').addEventListener('submit', function (e) {
            e.preventDefault();
            const username = document.getElementById('suUsername').value.trim();
            const password = document.getElementById('suPassword').value;
            const confirm = document.getElementById('suConfirmPassword').value;

            if (!username || !password || !confirm) {
                showToast('Please fill in all fields.');
                return;
            }
            if (username.length < 3) {
                showToast('Username must be at least 3 characters.');
                return;
            }
            if (password.length < 6) {
                showToast('Password must be at least 6 characters.');
                return;
            }
            if (password !== confirm) {
                showToast('Passwords do not match.');
                return;
            }

            const users = getUsers();
            if (users.find(u => u.username === username)) {
                showToast('That username is already taken.');
                return;
            }

            setLoading('btnSignUp', true);

            setTimeout(() => {
                users.push({ username, password: btoa(password), role: 'user' });
                saveUsers(users);
                showToast('Account created! You can now sign in.', 'success');
                setLoading('btnSignUp', false);
                setTimeout(() => switchTab('signin'), 1200);
            }, 600);
        });


        /* ══════════════════════════════════════════
           INTERACTIVE PARTICLE BACKGROUND
        ══════════════════════════════════════════ */
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        const mouse = { x: null, y: null };

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            buildParticles();
        }

        const COLORS = [
            'rgba(255,255,255,',   // white
            'rgba(129,140,248,',   // indigo
            'rgba(232,121,249,',   // pink
            'rgba(251,191,36,',    // amber
            'rgba(96,165,250,',    // blue
            'rgba(52,211,153,',    // teal
        ];

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.baseX = Math.random() * canvas.width;
                this.baseY = Math.random() * canvas.height;
                this.x = this.baseX;
                this.y = this.baseY;
                this.size = Math.random() * 2.2 + 0.9;
                this.vx = Math.random() * 0.35 - 0.175;
                this.vy = Math.random() * 0.35 - 0.175;
                this.depth = this.size * 22;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this.alpha = Math.random() * 0.45 + 0.28;
            }
            update() {
                this.baseX += this.vx;
                this.baseY += this.vy;

                if (this.baseX > canvas.width) this.baseX = 0;
                if (this.baseX < 0) this.baseX = canvas.width;
                if (this.baseY > canvas.height) this.baseY = 0;
                if (this.baseY < 0) this.baseY = canvas.height;

                if (mouse.x !== null) {
                    let dx = this.x - mouse.x;
                    let dy = this.y - mouse.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    let maxDistance = 150;

                    if (distance < maxDistance) {
                        let force = (maxDistance - distance) / maxDistance;
                        let directionX = (dx / distance) * force * 15;
                        let directionY = (dy / distance) * force * 15;

                        this.x += directionX;
                        this.y += directionY;
                    }
                }

                // Return to base position softly
                this.x += (this.baseX - this.x) * 0.05;
                this.y += (this.baseY - this.y) * 0.05;
            }
            draw() {
                if (this.size > 1.8 && window.innerWidth > 768) {
                    ctx.shadowBlur = 5;
                    ctx.shadowColor = this.color + '0.6)';
                } else {
                    ctx.shadowBlur = 0;
                }
                ctx.fillStyle = this.color + this.alpha + ')';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function buildParticles() {
            particles = [];
            // Significantly reduce particle count on mobile for performance
            const isMobile = window.innerWidth < 768;
            const density = isMobile ? 8000 : 3800;
            const n = Math.floor((canvas.width * canvas.height) / density);
            for (let i = 0; i < n; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        resizeCanvas();
        animate();
        window.addEventListener('resize', resizeCanvas);
    </script>
</body>
